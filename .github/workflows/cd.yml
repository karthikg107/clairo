name: CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, staging, dev]

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false   # never cancel a production deploy mid-flight

jobs:
  # ── Run CI checks first ───────────────────────────────────────────────────
  ci-gate:
    name: CI gate (must pass before deploy)
    uses: ./.github/workflows/ci.yml

  # ── PR preview deploy → Vercel ────────────────────────────────────────────
  preview-frontend:
    name: Preview deploy → Vercel
    if: github.event_name == 'pull_request'
    needs: ci-gate
    runs-on: ubuntu-latest
    outputs:
      preview_url: ${{ steps.deploy.outputs.preview_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy preview to Vercel
        id: deploy
        run: |
          URL=$(npx vercel \
            --token ${{ secrets.VERCEL_TOKEN }} \
            --yes \
            2>&1 | grep -Eo 'https://[a-zA-Z0-9.-]+\.vercel\.app' | tail -1)
          echo "preview_url=$URL" >> $GITHUB_OUTPUT
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.preview_url }}';
            const body = url
              ? `### Preview deployment\n\n✅ **[Open preview](${url})**\n\n\`${url}\``
              : '### Preview deployment\n\n⚠️ Preview URL not captured — check the deploy logs.';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

  # ── Production deploy → Vercel (main only) ───────────────────────────────
  deploy-frontend:
    name: Deploy frontend → Vercel
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: ci-gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy to Vercel (production)
        run: |
          npx vercel \
            --token ${{ secrets.VERCEL_TOKEN }} \
            --prod \
            --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ── Deploy backend to AWS ECS (main only) ────────────────────────────────
  deploy-backend:
    name: Deploy backend → AWS ECS
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: ci-gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPOSITORY: clairo-backend
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            --target base \
            ./backend
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Deploy to ECS
        env:
          IMAGE: ${{ steps.build-image.outputs.image }}
        run: |
          aws ecs update-service \
            --cluster clairo-prod \
            --service clairo-backend \
            --force-new-deployment \
            --region us-east-1
